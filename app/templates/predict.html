{% extends "base.html" %}
{% block title %}薪资预测{% endblock %}
{% block content %}
<h2 class="page-title">薪资预测</h2>
<div class="panel floating-panel">
    <div class="row g-2">
        <div class="col-12"><h5 class="mb-2">薪资预测表单</h5></div>
    </div>
    <div class="row g-2">
        <div class="col-md-4"><select id="pTitle" class="form-select"><option value="">请选择期望职位</option></select></div>
        <div class="col-md-4"><select id="pProvince" class="form-select"><option value="">请选择省份</option></select></div>
        <div class="col-md-4"><select id="pCity" class="form-select"><option value="">请选择城市</option></select></div>
        <div class="col-md-4"><select id="pEdu" class="form-select"><option value="">请选择学历</option></select></div>
        <div class="col-md-4"><select id="pExp" class="form-select"><option value="">请选择经验</option></select></div>
        <div class="col-md-4"><select id="pSize" class="form-select"><option value="">请选择公司规模</option></select></div>
    </div>
    <div class="mt-3"><button class="btn btn-primary" id="btnPredict">开始预测</button></div>
</div>
<div class="row g-3 mt-1">
    <div class="col-md-3"><div class="metric-card"><div>最低薪资</div><div id="predMin" class="metric-value">0</div></div></div>
    <div class="col-md-3"><div class="metric-card"><div>平均薪资</div><div id="predAvg" class="metric-value">0</div></div></div>
    <div class="col-md-3"><div class="metric-card"><div>最高薪资</div><div id="predMax" class="metric-value">0</div></div></div>
    <div class="col-md-3"><div class="metric-card"><div>置信度</div><div id="predConf" class="metric-value">0%</div></div></div>
</div>
<div class="small text-muted mt-2">同条件样本量：<span id="predSampleCount">0</span></div>
<div class="panel mt-3 subtle-panel">
    <h6 class="mb-2">模型评估信息</h6>
    <div class="small text-muted d-flex flex-wrap gap-4">
        <span>当前模型：<strong id="modelName">-</strong></span>
        <span>MAE：<strong id="modelMae">-</strong></span>
        <span>训练样本量：<strong id="modelTrainSize">0</strong></span>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/predict.js') }}"></script>
{% endblock %}
