{% extends "base.html" %}
{% block title %}{{ category_name }}分析{% endblock %}
{% block content %}
<h2 class="page-title">{{ category_name }}分析</h2>
<div class="row g-3 mb-3">
    <div class="col-md-6"><div class="metric-card"><div>岗位数量</div><div id="catTotalJobs" class="metric-value">0</div></div></div>
    <div class="col-md-6"><div class="metric-card"><div>平均薪资</div><div id="catAvgSalary" class="metric-value">0 元/月</div></div></div>
</div>
<div class="row g-3">
    <div class="col-lg-6"><div class="panel"><h5>学历结构</h5><div id="catEduChart" class="chart-box"></div></div></div>
    <div class="col-lg-6"><div class="panel"><h5>经验结构</h5><div id="catExpChart" class="chart-box"></div></div></div>
</div>
<div class="row g-3 mt-1">
    <div class="col-lg-12">
        <div class="panel">
            <h5>{{ category_name }}岗位展示（Top10）</h5>
            <table class="table table-striped table-hover mb-0" id="catJobTable">
                <thead>
                <tr><th>职位名称</th><th>城市</th><th>公司名称</th><th>平均薪资</th><th>学历</th><th>经验</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>
<script>window.currentCategory = "{{ category_name }}";</script>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/category.js') }}"></script>
{% endblock %}
