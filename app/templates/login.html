<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 招聘数据分析平台</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body class="login-bg">
<div class="login-card">
    <h3 class="mb-1">登录系统</h3>
    <div class="text-muted mb-3">请使用账号密码进入招聘数据分析平台</div>
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="alert alert-danger">{{ messages[0][1] }}</div>
        {% endif %}
    {% endwith %}
    <form method="post">
        <div class="mb-3">
            <label class="form-label">用户名</label>
            <input class="form-control" name="username" required>
        </div>
        <div class="mb-3">
            <label class="form-label">密码</label>
            <input class="form-control" type="password" name="password" required>
        </div>
        <button class="btn btn-primary w-100" type="submit">登录</button>
    </form>
    <div class="mt-3 small text-muted">默认账号：admin / Admin@123</div>
</div>
</body>
</html>
