{% extends "base.html" %}

{% block content %}
<div class="content">
    <h2 class="page-title">岗位交叉对比看板</h2>
<div style="background: rgba(52, 152, 219, 0.05); border-left: 4px solid #3498db; padding: 15px; border-radius: 4px; margin-bottom: 20px;">
    <p style="color: #555; font-size: 1.3rem; line-height: 1.6; margin-bottom: 10px;">
        本功能支持对不同维度下的招聘数据进行横向对比。你可以自由组合“岗位类别”与“工作城市”，直观分析两者的薪资差异与市场行情。
    </p>

    <div style="background: #fff; padding: 12px; border-radius: 4px; border: 1px solid #eee;">
        <p style="color: #2c3e50; font-size: 1rem; font-weight: bold; margin-bottom: 5px;">🔍 如何使用：</p>
        <ul style="color: #7f8c8d; font-size: 1rem; padding-left: 20px; margin: 0; line-height: 1.5;">
            <li><strong>分别在左（岗位A）右（岗位B）两侧下拉菜单中选择你想对比的职位和城市</strong> </li>
            <li><strong>下方图表将同步展示两者的最低、平均及最高薪资分布趋势</strong> </li>
        </ul>
    </div>
</div>
    <div class="content-head-bg floating-panel">
        <div class="compare-controls" style="display: flex; justify-content: space-around; align-items: center; gap: 20px; padding: 15px; flex-wrap: wrap;">

            <div class="side-control-group" style="display: flex; align-items: center; gap: 10px;">
                <span class="badge" style="background: #2f67ff; color: white;">岗位 A</span>
                <select id="select-cat-a" class="custom-select">
                    {% for cat in ["编辑", "内容运营", "广告", "公关", "调研分析", "产品经理", "政府事务", "市场营销", "推广投放", "电商运营", "线下运营", "业务运营", "销售招聘", "人力资源"] %}
                    <option value="{{ cat }}">{{ cat }}</option>
                    {% endfor %}
                </select>
                <select id="select-city-a" class="custom-select">
                    {% for city in ["北京市", "上海市", "天津市", "广州市", "深圳市", "杭州市", "武汉市", "成都市"] %}
                    <option value="{{ city }}">{{ city|replace('市', '') }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="vs-badge" style="font-size: 20px; font-weight: bold; color: #2f67ff;">VS</div>

            <div class="side-control-group" style="display: flex; align-items: center; gap: 10px;">
                <span class="badge" style="background: #ff4d4f; color: white;">岗位 B</span>
                <select id="select-cat-b" class="custom-select">
                    {% for cat in ["编辑", "内容运营", "广告", "公关", "调研分析", "产品经理", "政府事务", "市场营销", "推广投放", "电商运营", "线下运营", "业务运营", "销售招聘", "人力资源"] %}
                    <option value="{{ cat }}" {% if cat == "市场营销" %}selected{% endif %}>{{ cat }}</option>
                    {% endfor %}
                </select>
                <select id="select-city-b" class="custom-select">
                    {% for city in ["北京市", "上海市", "天津市", "广州市", "深圳市", "杭州市", "武汉市", "成都市"] %}
                    <option value="{{ city }}" {% if city == "上海市" %}selected{% endif %}>{{ city|replace('市', '') }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
    </div>

    <div class="comparison-layout" style="display: flex; gap: 20px; margin-top: 20px;">
        <div class="compare-column" style="flex: 1;">
            <div class="metric-card">
                <div class="nav-section-label" id="label-a">加载中...</div>
                <div class="metric-value" id="salary-a">￥--</div>
            </div>
            <div class="panel" style="margin-top: 15px;">
                <h5 id="title-a">数据趋势</h5>
                <div id="chart-a" style="height: 320px;"></div>
            </div>
        </div>

        <div class="compare-column" style="flex: 1;">
            <div class="metric-card">
                <div class="nav-section-label" id="label-b">加载中...</div>
                <div class="metric-value" id="salary-b">￥--</div>
            </div>
            <div class="panel" style="margin-top: 15px;">
                <h5 id="title-b">数据趋势</h5>
                <div id="chart-b" style="height: 320px;"></div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>

<script>
    let chartA, chartB;

    function initCharts() {
        chartA = echarts.init(document.getElementById('chart-a'));
        chartB = echarts.init(document.getElementById('chart-b'));
    }

    function getChartOption(data, color) {
        return {
            tooltip: { trigger: 'axis' },
            grid: { top: '15%', bottom: '15%', left: '15%', right: '5%' },
            xAxis: { type: 'category', data: ['最低', '平均', '最高'] },
            yAxis: { type: 'value' },
            series: [{
                data: data,
                type: 'bar',
                barWidth: '40%',
                itemStyle: { color: color, borderRadius: [4, 4, 0, 0] },
                label: { show: true, position: 'top', formatter: '{c}' }
            }]
        };
    }

    async function updateSide(side) {
        const city = document.getElementById(`select-city-${side}`).value;
        const category = document.getElementById(`select-cat-${side}`).value;
        const salaryEl = document.getElementById(`salary-${side}`);
        const labelEl = document.getElementById(`label-${side}`);

        labelEl.innerText = `${city} · ${category}`;

        try {
            // 使用 encodeURIComponent 确保中文字符正确传输
            const url = `/api/dashboard?city=${encodeURIComponent(city)}&category=${encodeURIComponent(category)}`;
            const response = await fetch(url);
            const res = await response.json();

            console.log(`${side} 侧结果:`, res);

            const salaryValue = res.avg_salary || 0;

            if (salaryValue > 0) {
                salaryEl.innerText = `￥${Math.round(salaryValue).toLocaleString()}`;
                const chartData = [Math.round(salaryValue*0.7), Math.round(salaryValue), Math.round(salaryValue*1.4)];
                const color = (side === 'a' ? '#2f67ff' : '#ff4d4f');
                (side === 'a' ? chartA : chartB).setOption(getChartOption(chartData, color));
            } else {
                salaryEl.innerText = "暂无数据";
                (side === 'a' ? chartA : chartB).setOption(getChartOption([0, 0, 0], '#ccc'));
            }
        } catch (error) {
            salaryEl.innerText = "加载出错";
        }
    }

    document.getElementById('select-cat-a').addEventListener('change', () => updateSide('a'));
    document.getElementById('select-city-a').addEventListener('change', () => updateSide('a'));
    document.getElementById('select-cat-b').addEventListener('change', () => updateSide('b'));
    document.getElementById('select-city-b').addEventListener('change', () => updateSide('b'));

    window.onload = () => {
        initCharts();
        updateSide('a');
        updateSide('b');
    };
</script>
{% endblock %}
