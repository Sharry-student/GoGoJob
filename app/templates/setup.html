<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>初始化引导</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body class="login-bg">
<div class="login-card" style="width:560px;">
    <h3>系统初始化引导</h3>
    <p class="text-muted mb-2">当前用户数：{{ users_count }}，岗位数据量：{{ jobs_count }}</p>
    <ol class="small text-muted">
        <li>先登录管理员账号（默认：admin / Admin@123）</li>
        <li>执行手动初始化入口 <code>/bootstrap</code> 导入 all_jobs_cleaned.csv</li>
        <li>初始化后自动跳转首页分析看板</li>
    </ol>
    <div class="d-flex gap-2 mt-3">
        <a class="btn btn-primary" href="{{ url_for('auth.login') }}">前往登录</a>
        <a class="btn btn-outline-light" href="{{ url_for('bootstrap') }}">直接执行 /bootstrap</a>
    </div>
</div>
</body>
</html>
