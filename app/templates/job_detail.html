{% extends "base.html" %}
{% block title %}岗位详情{% endblock %}
{% block content %}
<h2 class="page-title">岗位详情分析</h2>
<div class="row g-3 mb-3">
    <div class="col-md-3"><div class="metric-card"><div>岗位名称</div><div id="dTitle" class="metric-value" style="font-size:18px;">-</div></div></div>
    <div class="col-md-3"><div class="metric-card"><div>样本规模</div><div id="dCount" class="metric-value">0</div></div></div>
    <div class="col-md-3"><div class="metric-card"><div>样本均值薪资</div><div id="dAvg" class="metric-value">0</div></div></div>
    <div class="col-md-3"><div class="metric-card"><div>当前岗位薪资</div><div id="dCur" class="metric-value">0</div></div></div>
</div>
<div class="row g-3">
    <div class="col-lg-12"><div class="panel"><h5>薪资趋势</h5><div id="trendChart" class="chart-box"></div></div></div>
    <div class="col-lg-6"><div class="panel"><h5>技能Top10</h5><div id="skillChart" class="chart-box"></div></div></div>
    <div class="col-lg-6"><div class="panel"><h5>公司规模分布</h5><div id="companyChart" class="chart-box"></div></div></div>
</div>
<div class="row g-3 mt-1">
    <div class="col-lg-12">
        <div class="panel">
            <div class="d-flex justify-content-between align-items-center">
                <h5 class="mb-0">相似岗位推荐</h5>
                <a class="btn btn-sm btn-outline-primary" id="exportSimilarBtn" href="#">导出CSV</a>
            </div>
            <table class="table table-striped mt-2" id="similarTable">
                <thead><tr><th>职位</th><th>标准岗位</th><th>地区</th><th>公司</th><th>薪资</th><th>相似度</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>
<script>window.jobId = {{ job_id }};</script>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/job_detail.js') }}"></script>
{% endblock %}
