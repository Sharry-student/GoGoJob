{% extends "base.html" %}
{% block title %}薪资热力图{% endblock %}
{% block content %}
<h2 class="page-title">薪资热力图</h2>
<div style="background: rgba(52, 152, 219, 0.05); border-left: 4px solid #3498db; padding: 15px; border-radius: 4px; margin-bottom: 20px;">
    <p style="color: #555; font-size: 0.9rem; line-height: 1.6; margin-bottom: 10px;">
        通过色彩深浅直观呈现全国薪资水平差异
    </p>
    <div style="background: #fff; padding: 10px; border-radius: 4px; border: 1px solid #eee;">
        <p style="color: #e67e22; font-size: 0.85rem; font-weight: bold; margin: 0;">
            💡 交互小技巧：直接点击地图上的省份，右侧将同步显示该地区薪资最高的 10 个城市名次及相关岗位
        </p>
    </div>
</div>
<div class="panel mb-3">
    <div class="row g-2">
        <div class="col-md-3"><select id="mapCategory" class="form-select"><option value="全部">全部类别</option></select></div>
        <div class="col-md-3"><select id="mapEdu" class="form-select"><option value="不限">学历不限</option></select></div>
        <div class="col-md-3"><select id="mapExp" class="form-select"><option value="不限">经验不限</option></select></div>
        <div class="col-md-3"><select id="mapSize" class="form-select"><option value="不限">规模不限</option></select></div>
    </div>
    <div class="mt-2 d-flex gap-2">
        <button class="btn btn-primary" id="btnMapSearch">查询</button>
        <button class="btn btn-outline-secondary" id="btnMapReset">一键清空</button>
    </div>
</div>
<div class="row g-3">
    <div class="col-lg-8"><div class="panel map-main-panel"><h5>全国薪资热力图</h5><div id="chinaMapChart" class="chart-box"></div></div></div>
    <div class="col-lg-4"><div class="panel map-top-panel"><h5>排名TOP10</h5><table class="table table-sm" id="mapTopTable"><thead><tr><th>省份</th><th>平均薪资</th></tr></thead><tbody></tbody></table></div></div>
</div>
<div class="row g-3 mt-1">
    <div class="col-lg-12"><div class="panel"><h5>省份平均薪资柱状图</h5><div id="mapBarChart" class="chart-box"></div></div></div>
</div>
<div class="offcanvas offcanvas-end" tabindex="-1" id="provinceDrawer" aria-labelledby="provinceDrawerLabel">
    <div class="offcanvas-header">
        <h5 id="provinceDrawerLabel">省份岗位明细</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
    </div>
    <div class="offcanvas-body">
        <h6>城市统计</h6>
        <table class="table table-sm" id="drawerCityTable">
            <thead><tr><th>城市</th><th>岗位数</th><th>平均薪资</th></tr></thead>
            <tbody></tbody>
        </table>
        <h6 class="mt-3">高薪岗位Top</h6>
        <table class="table table-sm" id="drawerJobTable">
            <thead><tr><th>职位</th><th>城市</th><th>公司</th><th>薪资</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/echarts@5/map/js/china.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/map.js') }}"></script>
{% endblock %}
